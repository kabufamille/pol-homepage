<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お客様アンケート | pol</title>
    <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --color-primary: #8E6E53; --color-accent: #D4A59A; --color-raspberry: #C41E3A; --color-bg: #FDFBF7; }
        body { margin: 0; padding: 0; font-family: 'Noto Sans JP', sans-serif; background-color: var(--color-bg); color: #4A4A4A; line-height: 1.8; }
        .header { background: #fff; padding: 15px 0; text-align: center; border-bottom: 1px solid #eee; }
        .logo-text { font-family: 'Kiwi Maru', serif; font-size: 1.4rem; color: var(--color-primary); }
        .survey-section { padding: 40px 0; }
        .container { width: 90%; max-width: 800px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .survey-group-title { border-left: 4px solid var(--color-accent); padding-left: 15px; margin: 30px 0 15px; color: var(--color-primary); font-family: 'Noto Serif JP', serif; }
        .form-group { margin-bottom: 25px; }
        .form-label { display: block; font-weight: bold; margin-bottom: 10px; }
        .form-select, .form-input, .form-textarea { width: 100%; padding: 12px; border: 1px solid #E8DCC4; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .rating-group { display: flex; justify-content: space-between; align-items: center; background: #FAF9F6; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        .btn-primary { width: 100%; padding: 18px; background-color: var(--color-primary); color: #fff; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        #success-message { display: none; text-align: center; padding: 40px; }
    </style>
</head>
<body>
    <header class="header"><div class="logo-text">Fermeアンケート</div></header>
    <main class="survey-section">
        <div class="container">
            <form id="survey-form">
                <h4 class="survey-group-title">1. 基本情報</h4>
                <div class="form-group"><label class="form-label">ご購入いただいた商品 *</label><select id="productName" name="productName" class="form-select" required><option value="">読み込み中...</option></select></div>
                <div class="form-group"><label class="form-label">性別 *</label><select name="gender" class="form-select"><option value="女性">女性</option><option value="男性">男性</option><option value="回答しない">回答しない</option></select></div>
                <div class="form-group"><label class="form-label">年代 *</label><select name="ageGroup" class="form-select"><option value="30代">30代</option><option value="40代">40代</option><option value="その他">その他</option></select></div>

                <h4 class="survey-group-title">2. 商品の評価</h4>
                <div id="ratings-container"></div>

                <h4 class="survey-group-title">3. 商品について</h4>
                <div class="form-group"><label class="form-label">お気に入りの飲み物</label><input type="text" name="drink" class="form-input"></div>
                <div class="form-group"><label class="form-label">どんな時に食べたいですか？ *</label><input type="text" name="nextOccasion" class="form-input" required></div>
                <div class="form-group"><label class="form-label">選んだ理由は？ *</label><input type="text" name="decisiveFactor" class="form-input" required></div>
                <div class="form-group"><label class="form-label">ご意見・ご感想</label><textarea name="message" class="form-textarea" rows="4"></textarea></div>

                <button type="submit" id="submitBtn" class="btn-primary">アンケートを送信する</button>
            </form>
            <div id="success-message"><h4>送信完了しました。</h4><p>ありがとうございました！</p></div>
        </div>
    </main>
    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbzglfZ9N-OySx6x_xaU7EyOxVKL4kxzJjkoYAcOF-U9Sqz5k-6BtXTC0YN0vgQmRUnvKg/exec';
        let ratingKeys = [];

        window.onload = async () => {
            const res = await fetch(GAS_URL);
            const cfg = await res.json();
            const pSel = document.getElementById('productName');
            pSel.innerHTML = '<option value="">選択してください</option>';
            cfg.products.forEach(p => { const opt = document.createElement('option'); opt.value = opt.textContent = p; pSel.appendChild(opt); });
            const rCon = document.getElementById('ratings-container');
            ratingKeys = cfg.ratings;
            cfg.ratings.forEach((r, i) => {
                const div = document.createElement('div'); div.className = 'rating-group';
                div.innerHTML = `<span>${r}</span><select name="rate_${i}" class="form-select" style="width:80px;"><option value="5">5</option><option value="4">4</option><option value="3">3</option></select>`;
                rCon.appendChild(div);
            });
        };

        document.getElementById('survey-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn'); btn.disabled = true; btn.textContent = '送信中...';
            const fd = new FormData(e.target);
            const data = { productName: fd.get('productName'), gender: fd.get('gender'), ageGroup: fd.get('ageGroup'), drink: fd.get('drink'), nextOccasion: fd.get('nextOccasion'), decisiveFactor: fd.get('decisiveFactor'), message: fd.get('message'), ratings: {} };
            ratingKeys.forEach((key, i) => { data.ratings[key] = fd.get(`rate_${i}`); });
            await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(data) });
            document.getElementById('survey-form').style.display = 'none';
            document.getElementById('success-message').style.display = 'block';
        };
    </script>
</body>
</html>
