<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お客様アンケート | Ferme</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary: #8E6E53;
            --color-accent: #D4A59A;
            --color-raspberry: #C41E3A;
            --color-sand: #D2B48C;
            --color-bg: #FDFBF7;
            --font-serif: 'Noto Serif JP', serif;
            --font-kiwi: 'Kiwi Maru', serif;
        }
        body { margin: 0; padding: 0; font-family: 'Noto Sans JP', sans-serif; color: #4A4A4A; background-color: var(--color-bg); line-height: 1.8; }
        .header { background: rgba(255, 255, 255, 0.9); padding: 15px 0; text-align: center; border-bottom: 1px solid rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(5px); }
        .logo-text { font-family: var(--font-kiwi); font-size: 1.4rem; color: var(--color-primary); font-weight: 500; }
        .survey-section { padding: 60px 0; }
        .container { width: 90%; max-width: 800px; margin: 0 auto; }
        .survey-form-container { background: #ffffff; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        .survey-group-title { border-left: 4px solid var(--color-accent); padding-left: 15px; margin: 40px 0 20px; color: var(--color-primary); font-family: var(--font-serif); font-size: 1.25rem; }
        .form-group { margin-bottom: 30px; }
        .form-label { display: block; font-weight: 500; margin-bottom: 12px; color: #333; }
        .required { color: var(--color-raspberry); margin-left: 4px; font-size: 0.9rem; }
        .form-select, .form-textarea, .form-input { width: 100%; padding: 12px 15px; border: 1px solid #E8DCC4; border-radius: 8px; font-size: 1rem; font-family: inherit; transition: border-color 0.3s; background-color: #fff; box-sizing: border-box; }
        .rating-group { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; padding: 15px; background: #FAF9F6; border-radius: 8px; border: 1px solid transparent; }
        .rating-label { flex: 1; font-weight: 500; color: var(--color-primary); }
        .rating-options { display: flex; gap: 15px; }
        .rating-options label { display: flex; flex-direction: column; align-items: center; font-size: 0.8rem; cursor: pointer; color: #888; width: 35px; }
        .rating-options input { margin: 0 0 5px 0; accent-color: var(--color-raspberry); transform: scale(1.1); }
        .radio-group-vertical { display: flex; flex-direction: column; gap: 12px; }
        .radio-group-vertical label { display: flex; align-items: center; gap: 12px; cursor: pointer; padding: 12px 15px; background: #FAF9F6; border-radius: 8px; border: 1px solid transparent; }
        .btn-primary { width: 100%; padding: 18px; background-color: var(--color-primary); color: white; border: none; border-radius: 50px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: all 0.3s; margin-top: 20px; box-shadow: 0 4px 15px rgba(142, 110, 83, 0.2); }
        #success-message { display: none; text-align: center; padding: 60px 20px; }
        ::placeholder { color: #bbb; opacity: 0.7; font-weight: 300; }
        .form-subtext { font-size: 0.8rem; color: #808080; margin-bottom: 15px; margin-top: -10px; opacity: 0.8; }
        
        /* Success Animation */
        .success-icon-container {
            width: 90px; height: 90px; margin: 0 auto 30px;
            background-color: var(--color-primary); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            transform: scale(0); animation: successPop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            box-shadow: 0 10px 25px rgba(142, 110, 83, 0.2);
        }
        .success-icon-container svg {
            width: 50px; height: 50px; fill: none; stroke: white;
            stroke-width: 5; stroke-linecap: round; stroke-linejoin: round;
            stroke-dasharray: 100; stroke-dashoffset: 100;
            animation: checkDraw 0.5s ease forwards 0.4s;
        }
        #success-message h4, #success-message p {
            opacity: 0; transform: translateY(15px);
            animation: textFadeUp 0.8s ease forwards 0.6s;
        }
        @keyframes successPop { 0% { transform: scale(0); } 100% { transform: scale(1); } }
        @keyframes checkDraw { to { stroke-dashoffset: 0; } }
        @keyframes textFadeUp { to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <header class="header"><div class="container"><div class="logo"><span class="logo-text">Fermeアンケート</span></div></div></header>
    <main><section class="survey-section"><div class="container">
        <div style="text-align: center; margin-bottom: 40px;"><p style="font-family: var(--font-serif); font-size: 1.1rem; color: var(--color-primary);">Fermeのお菓子をお楽しみいただき、ありがとうございます。<br>より良いパン・お菓子作りのため、ぜひあなたの声をお聞かせください。</p></div>
        <div class="survey-form-container">
            <form id="survey-form">
                <h4 class="survey-group-title">1. 基本情報</h4>
                <div class="form-group"><label class="form-label">ご購入いただいた商品 <span class="required">*</span></label><select id="productName" name="productName" class="form-select" required><option value="">選択してください (読み込み中...)</option></select></div>
                <div class="form-group"><label class="form-label">性別 <span class="required">*</span></label><div style="display: flex; gap: 20px;"><label><input type="radio" name="gender" value="男性" required> 男性</label><label><input type="radio" name="gender" value="女性"> 女性</label><label><input type="radio" name="gender" value="回答しない"> 回答しない</label></div></div>
                <div class="form-group"><label class="form-label">年代 *</label><select name="ageGroup" class="form-select" required><option value="">選択してください</option><option value="10代以下">10代以下</option><option value="20代">20代</option><option value="30代">30代</option><option value="40代">40代</option><option value="50代">50代</option><option value="60代以上">60代以上</option></select></div>
                <h4 class="survey-group-title">2. 商品の評価</h4><div id="ratings-container"></div>
                <h4 class="survey-group-title">3. 商品について</h4>
                <div class="form-group">
                    <label class="form-label">選んだ理由は？ <span class="required">*</span></label>
                    <div class="radio-group-vertical">
                        <label><input type="checkbox" name="purchaseTrigger" value="以前食べて美味しかったから"> 以前食べて美味しかったから</label>
                        <label><input type="checkbox" name="purchaseTrigger" value="全粒粉や酵母などの素材へのこだわり"> 全粒粉や酵母などの素材へのこだわり</label>
                        <label><input type="checkbox" name="purchaseTrigger" value="SNSやホームページを見て"> SNSやホームページを見て</label>
                        <label><input type="checkbox" name="purchaseTrigger" value="知人・友人のおすすめ"> 知人・友人のおすすめ</label>
                        <label><input type="checkbox" name="purchaseTrigger" value="通りがかりで気になった"> 通りがかりで気になった</label>
                        <label><input type="checkbox" name="purchaseTrigger" value="初めて購入します"> 初めて購入します</label>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">どんな時に食べたいですか？ <span class="required">*</span></label>
                    <div class="radio-group-vertical">
                        <label><input type="checkbox" name="nextOccasion" value="食事として"> 食事として</label>
                        <label><input type="checkbox" name="nextOccasion" value="おやつ・ティータイム"> おやつ・ティータイム</label>
                        <label><input type="checkbox" name="nextOccasion" value="自分へのご褒美"> 自分へのご褒美</label>
                        <label><input type="checkbox" name="nextOccasion" value="家族と一緒に"> 家族と一緒に</label>
                        <label><input type="checkbox" name="nextOccasion" value="お土産として"> お土産として</label>
                    </div>
                </div>
                <div class="form-group"><label class="form-label">この商品に合いそうな飲物は？</label><input type="text" name="drinkPaired" class="form-input" placeholder="（例：コーヒー、ハーブティーなど）"></div>
                <div class="form-group"><label class="form-label">ご意見・ご感想</label><textarea name="message" class="form-textarea" rows="4" placeholder="皆様のご意見をお聞かせください。"></textarea></div>
                <button type="submit" id="submitBtn" class="btn-primary">アンケートを送信する</button>
            </form>
            <div id="success-message">
                <div class="success-icon-container">
                    <svg viewBox="0 0 52 52"><path d="M14.1 27.2l7.1 7.2 16.7-16.8"/></svg>
                </div>
                <h4>アンケートにお答えいただき、ありがとうございます</h4>
                <p>いただいたお声は、これからのFermeのお菓子作りのために大切にさせていただきます。</p>
            </div>
        </div>
    </div></section></main>
    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbyEGjmNa4X777dMyzLHJjK-o4n92q07Bduv6cNcM2RnEOqBdr2RuQqKDFS3wdMRDJvcYg/exec';
        let ratingKeys = [];
        window.onload = async () => {
            const res = await fetch(GAS_URL);
            const cfg = await res.json();
            const pSel = document.getElementById('productName');
            pSel.innerHTML = '<option value="">選択してください</option>';
            cfg.products.forEach(p => { const opt = document.createElement('option'); opt.value = opt.textContent = p; pSel.appendChild(opt); });
            const rCon = document.getElementById('ratings-container');
            ratingKeys = cfg.ratings;
            cfg.ratings.forEach((r, i) => {
                const div = document.createElement('div'); div.className = 'rating-group';
                div.innerHTML = `<div class="rating-label">${r} *</div><div class="rating-options">` + [5,4,3,2,1].map(v => `<label><input type="radio" name="r_${i}" value="${v}" required><span>${v}</span></label>`).join('') + `</div>`;
                rCon.appendChild(div);
            });
        };
        document.getElementById('survey-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn'); btn.disabled = true; btn.textContent = '送信中...';
            const fd = new FormData(e.target);
            
            // 複数選択の値を結合
            const purchaseTriggers = fd.getAll('purchaseTrigger').join('、');
            const nextOccasions = fd.getAll('nextOccasion').join('、');

            const data = { 
                productName: fd.get('productName'), 
                gender: fd.get('gender'), 
                ageGroup: fd.get('ageGroup'), 
                drinkPaired: fd.get('drinkPaired'), 
                nextOccasion: nextOccasions, 
                purchaseTrigger: purchaseTriggers, 
                message: fd.get('message'), 
                ratings: {} 
            };
            ratingKeys.forEach((key, i) => { data.ratings[key] = fd.get(`r_${i}`); });
            await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(data) });
            document.getElementById('survey-form').style.display = 'none';
            document.getElementById('success-message').style.display = 'block';
            window.scrollTo(0, 0);
        };
    </script>
</body>
</html>
