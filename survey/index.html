<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品アンケート</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f4f7f6; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { color: #333; text-align: center; }
        .item { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], select, textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #218838; }
        #status { margin-top: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>商品アンケート</h2>
    <form id="surveyForm">
        <div class="item">
            <label>商品名</label>
            <select name="productName" id="productName" required>
                <option value="">読込中...</option>
            </select>
        </div>

        <div class="item">
            <label>性別</label>
            <select name="gender">
                <option value="男性">男性</option>
                <option value="女性">女性</option>
                <option value="その他">その他</option>
            </select>
        </div>

        <div class="item">
            <label>年代</label>
            <select name="ageGroup">
                <option value="10代">10代</option>
                <option value="20代">20代</option>
                <option value="30代">30代</option>
                <option value="40代">40代</option>
                <option value="50代以上">50代以上</option>
            </select>
        </div>

        <div id="ratingContainer">
            </div>

        <div class="item">
            <label>お気に入りの飲み物</label>
            <input type="text" name="drink" placeholder="例：コーヒー">
        </div>

        <div class="item">
            <label>ご意見・ご感想</label>
            <textarea name="message" rows="4"></textarea>
        </div>

        <button type="submit" id="submitBtn">アンケートを送信する</button>
    </form>
    <div id="status"></div>
</div>

<script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyTEyVNRi_dYM7c4akDCK7Bw4MshndKpv99KJ6gJ0v6jrjOESvjJmJWjLtzohSErzW9Nw/exec';

    // 1. ページ読み込み時にGASから「設定」データを取得
    window.onload = async () => {
        try {
            const response = await fetch(GAS_URL);
            const data = await response.json();

            // 商品リストを反映
            const productSelect = document.getElementById('productName');
            productSelect.innerHTML = '<option value="">選択してください</option>';
            data.products.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p;
                opt.textContent = p;
                productSelect.appendChild(opt);
            });

            // 評価項目（味、食感など）を反映
            const ratingContainer = document.getElementById('ratingContainer');
            data.ratings.forEach(r => {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `<label>${r} (1:悪い 〜 5:良い)</label>
                                 <input type="number" name="rating_${r}" min="1" max="5" value="5">`;
                ratingContainer.appendChild(div);
            });
        } catch (e) {
            console.error(e);
            document.getElementById('status').textContent = '設定データの取得に失敗しました。';
        }
    };

    // 2. 送信処理
    document.getElementById('surveyForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const status = document.getElementById('status');
        btn.disabled = true;
        status.textContent = '送信中...';

        const formData = new FormData(e.target);
        const sendData = {
            productName: formData.get('productName'),
            gender: formData.get('gender'),
            ageGroup: formData.get('ageGroup'),
            drink: formData.get('drink'),
            message: formData.get('message'),
            ratings: {}
        };

        // 評価項目をまとめる
        for (let [key, value] of formData.entries()) {
            if (key.startsWith('rating_')) {
                const label = key.replace('rating_', '');
                sendData.ratings[label] = value;
            }
        }

        try {
            await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify(sendData)
            });
            status.style.color = 'green';
            status.textContent = '送信完了！LINE通知を確認してください。';
            e.target.reset();
        } catch (err) {
            status.style.color = 'red';
            status.textContent = 'エラーが発生しました。';
        } finally {
            btn.disabled = false;
        }
    };
</script>

</body>
</html>
